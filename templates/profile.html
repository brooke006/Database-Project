<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - FitTrackDB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #111111; color: #F5F5F5; }
        nav {
            background: #1a1a1a; padding: 14px 24px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #FFD700; flex-wrap: wrap; gap: 10px;
        }
        nav h1 { color: #FFD700; font-size: 22px; letter-spacing: 1px; }
        nav a {
            color: #FFD700; text-decoration: none; font-size: 12px;
            padding: 6px 12px; border: 1px solid #FFD700; border-radius: 6px;
        }
        nav a:hover { background: #FFD700; color: #111111; }
        .container { max-width: 560px; margin: 40px auto; padding: 0 16px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 32px; border: 1px solid #2a2a2a; }
        .avatar {
            width: 72px; height: 72px; background: #FFD700; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold; color: #111111;
            margin: 0 auto 20px auto;
        }
        h2 { color: #FFD700; font-size: 20px; text-align: center; margin-bottom: 4px; }
        .email-display { color: #888; font-size: 13px; text-align: center; margin-bottom: 28px; }
        .section-title {
            font-size: 12px; color: #FFD700; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 16px; margin-top: 24px;
            padding-bottom: 6px; border-bottom: 1px solid #333;
        }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; margin-top: 14px; }
        input {
            width: 100%; padding: 10px 12px; border: 1px solid #333;
            border-radius: 8px; font-size: 14px; outline: none;
            background: #222; color: #F5F5F5;
        }
        input:focus { border-color: #FFD700; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .hint { color: #555; font-size: 12px; margin-top: 4px; }
        button {
            width: 100%; margin-top: 24px; padding: 12px;
            background: #FFD700; color: #111111; border: none;
            border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #e6c200; }
        .success {
            background: #002a00; color: #00cc44; padding: 10px;
            border-radius: 8px; margin-bottom: 16px; font-size: 13px;
            border: 1px solid #00cc44; text-align: center;
        }
        .back { display: block; text-align: center; margin-top: 16px; color: #555; text-decoration: none; font-size: 13px; }
        .back:hover { color: #FFD700; }
    </style>
</head>
<body>
    <nav>
        <h1>⚡ FitTrackDB</h1>
        <a href="/dashboard">← Dashboard</a>
    </nav>
    <div class="container">
        <div class="card">
            <div class="avatar">{{ session['user_name'][0] }}</div>
            <h2>{{ user[0] }} {{ user[1] }}</h2>
            <p class="email-display">{{ user[2] }}</p>

            <form method="POST">
                <div class="section-title">Personal Info</div>
                <div class="grid2">
                    <div>
                        <label>First Name</label>
                        <input type="text" name="first_name" value="{{ user[0] }}" required>
                    </div>
                    <div>
                        <label>Last Name</label>
                        <input type="text" name="last_name" value="{{ user[1] }}" required>
                    </div>
                </div>
                <label>Email Address</label>
                <input type="email" name="email" value="{{ user[2] }}" required>
                <label>Date of Birth</label>
                <input type="date" name="dob" value="{{ user[3] }}" required>

                <div class="section-title">Change Password</div>
                <label>New Password</label>
                <input type="password" name="password" placeholder="Leave blank to keep current password">
                <p class="hint">Only fill this in if you want to change your password.</p>

                <button type="submit">Save Changes</button>
            </form>
            <a href="/dashboard" class="back">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
