<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Meal - FitTrackDB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #111111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1a1a1a; padding: 36px; border-radius: 12px; width: 100%; max-width: 460px; border: 1px solid #2a2a2a; }
        h2 { color: #FFD700; font-size: 20px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; margin-top: 14px; }
        input, select { width: 100%; padding: 10px 12px; border: 1px solid #333; border-radius: 8px; font-size: 14px; outline: none; background: #222; color: #F5F5F5; }
        input:focus, select:focus { border-color: #FFD700; }
        .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { width: 100%; margin-top: 24px; padding: 12px; background: #FFD700; color: #111111; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        button:hover { background: #e6c200; }
        .back { display: block; text-align: center; margin-top: 16px; color: #555; text-decoration: none; font-size: 13px; }
        .back:hover { color: #FFD700; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🍽 Log a Meal</h2>
        <p class="subtitle">Track your nutrition</p>
        <form method="POST">
            <label>Meal Name</label>
            <input type="text" name="meal_name" placeholder="e.g. Grilled Chicken Salad" required>
            <label>Date</label>
            <input type="date" name="meal_date" required>
            <label>Meal Type</label>
            <select name="meal_type">
                <option value="Breakfast">Breakfast</option>
                <option value="Lunch">Lunch</option>
                <option value="Dinner">Dinner</option>
                <option value="Snack">Snack</option>
            </select>
            <div class="grid2">
                <div>
                    <label>Calories</label>
                    <input type="number" name="calories" placeholder="e.g. 450" required>
                </div>
                <div>
                    <label>Protein (g)</label>
                    <input type="number" name="protein" placeholder="e.g. 35" required>
                </div>
                <div>
                    <label>Carbs (g)</label>
                    <input type="number" name="carbs" placeholder="e.g. 40" required>
                </div>
                <div>
                    <label>Fat (g)</label>
                    <input type="number" name="fat" placeholder="e.g. 12" required>
                </div>
            </div>
            <button type="submit">Save Meal</button>
        </form>
        <a href="/dashboard" class="back">← Back to Dashboard</a>
    </div>
</body>
</html>
