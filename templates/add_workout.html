<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log Workout - FitTrackDB</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #111111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #1a1a1a; padding: 36px; border-radius: 12px; width: 100%; max-width: 460px; border: 1px solid #2a2a2a; }
        h2 { color: #FFD700; font-size: 20px; margin-bottom: 6px; }
        .subtitle { color: #888; font-size: 13px; margin-bottom: 24px; }
        label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; margin-top: 14px; }
        input, select, textarea {
            width: 100%; padding: 10px 12px; border: 1px solid #333;
            border-radius: 8px; font-size: 14px; outline: none;
            background: #222; color: #F5F5F5;
        }
        input:focus, select:focus, textarea:focus { border-color: #FFD700; }
        textarea { resize: vertical; height: 80px; }
        button {
            width: 100%; margin-top: 24px; padding: 12px;
            background: #FFD700; color: #111111; border: none;
            border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #e6c200; }
        .back { display: block; text-align: center; margin-top: 16px; color: #555; text-decoration: none; font-size: 13px; }
        .back:hover { color: #FFD700; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Log a Workout</h2>
        <p class="subtitle">Track your training</p>
        <form method="POST">
            <label>Date</label>
            <input type="date" name="workout_date" required>
            <label>Workout Type</label>
            <select name="workout_type">
                <option value="Strength">Strength</option>
                <option value="Cardio">Cardio</option>
                <option value="Flexibility">Flexibility</option>
                <option value="HIIT">HIIT</option>
                <option value="Other">Other</option>
            </select>
            <label>Duration (minutes)</label>
            <input type="number" name="duration" placeholder="e.g. 45" required>
            <label>Notes</label>
            <textarea name="notes" placeholder="e.g. Upper body day, felt strong..."></textarea>
            <button type="submit">Save Workout</button>
        </form>
        <a href="/dashboard" class="back">← Back to Dashboard</a>
    </div>
</body>
</html>
